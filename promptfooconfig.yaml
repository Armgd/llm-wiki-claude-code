description: "Plugin eval: llm-wiki"
prompts:
  - file://eval/lib/prompt-template-local.json
providers:
  - id: anthropic:claude-agent-sdk
    label: claude-skill-eval
    config:
      model: claude-sonnet-4-6
      skills:
        - ./.agents/skills/wiki-capture/
        - ./.agents/skills/wiki-configure/
        - ./.agents/skills/wiki-ingest/
        - ./.agents/skills/wiki-lint/
        - ./.agents/skills/wiki-query/
      allowedTools:
        - Read
        - Glob
        - Grep
      systemPrompt: preset:claude_code
defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-6
tests:
  - description: "[llm-wiki] Clean trigger — wiki-capture activates for end-of-session knowledge capture"
    vars:
      query: We just finished debugging that cache-invalidation issue. Capture this session into my wiki before we wrap up.
    assert:
      - type: icontains
        value: wiki-capture
        metric: criterion/references-wiki-capture
      - type: icontains-any
        value:
          - llm-wiki/vault
          - wiki-configure
        metric: criterion/resolves-vault-config-or-points-to-configure
      - type: icontains
        value: session log
        metric: criterion/plans-session-log
      - type: icontains-any
        value:
          - Decisions
          - Findings
          - Next Steps
        metric: criterion/session-log-sections
      - type: icontains-any
        value:
          - "[["
          - wikilink
        metric: criterion/wikilink-citations
    metadata:
      plugin: llm-wiki
      scenario: activation-capture
      mode: string_match
      skills:
        - wiki-capture
  - description: "[llm-wiki] Clean trigger — wiki-configure activates for first-time setup"
    vars:
      query: I just installed the llm-wiki plugin. Set it up for my vault at ~/Documents/ObsidianVault.
    assert:
      - type: icontains
        value: wiki-configure
        metric: criterion/references-wiki-configure
      - type: icontains-all
        value:
          - inbox
          - projects
          - resources
        metric: criterion/maps-required-folder-roles
      - type: icontains
        value: wiki-schema.md
        metric: criterion/writes-schema
    metadata:
      plugin: llm-wiki
      scenario: activation-configure
      mode: string_match
      skills:
        - wiki-configure
  - description: "[llm-wiki] Clean trigger — wiki-ingest activates for source ingestion"
    vars:
      query: "Ingest this article into my wiki: \"00 - Inbox/The AI Layoff Trap.md\""
    assert:
      - type: icontains
        value: wiki-ingest
        metric: criterion/references-wiki-ingest
      - type: icontains-any
        value:
          - source summary
          - source-summary
        metric: criterion/plans-source-summary
      - type: icontains-any
        value:
          - Key Claims
          - Relevance
          - Contradictions
        metric: criterion/source-summary-sections
      - type: icontains
        value: archiv
        metric: criterion/archives-original
      - type: icontains-any
        value:
          - move_note
          - backlink
        metric: criterion/backlink-safe-move
    metadata:
      plugin: llm-wiki
      scenario: activation-ingest
      mode: string_match
      skills:
        - wiki-ingest
  - description: "[llm-wiki] Clean trigger — wiki-lint activates for a wiki health check"
    vars:
      query: Run a health check on my wiki — I want to know about orphans, broken links, and stale TODOs.
    assert:
      - type: icontains
        value: wiki-lint
        metric: criterion/references-wiki-lint
      - type: icontains
        value: orphan
        metric: criterion/checks-orphans
      - type: icontains-any
        value:
          - broken link
          - broken wikilink
          - unresolved
        metric: criterion/checks-broken-links
      - type: icontains-any
        value:
          - stale
          - TODO
        metric: criterion/checks-stale-todos
      - type: icontains-any
        value:
          - health report
          - Wiki Health
        metric: criterion/produces-health-report
    metadata:
      plugin: llm-wiki
      scenario: activation-lint
      mode: string_match
      skills:
        - wiki-lint
  - description: "[llm-wiki] Negative trigger — unrelated prompt does not activate any llm-wiki skill"
    vars:
      query: Write a Python script that reads a CSV file and outputs the top 10 rows sorted by the revenue column.
    assert:
      - type: icontains
        value: python
        metric: criterion/answers-the-python-task
      - type: icontains
        value: csv
        metric: criterion/handles-csv
      - type: not-icontains-any
        value:
          - wiki-capture
          - wiki-ingest
          - wiki-query
          - wiki-lint
          - wiki-configure
        metric: criterion/no-wiki-skill-mentioned
      - type: not-icontains-any
        value:
          - wiki-schema
          - llm-wiki
        metric: criterion/no-wiki-config-mentioned
    metadata:
      plugin: llm-wiki
      scenario: activation-negative-non-wiki
      mode: string_match
      skills:
        - wiki-capture
  - description: "[llm-wiki] Clean trigger — wiki-query activates for a wiki lookup"
    vars:
      query: What does my wiki say about container networking approaches?
    assert:
      - type: icontains
        value: wiki-query
        metric: criterion/references-wiki-query
      - type: icontains
        value: container networking
        metric: criterion/searches-the-topic
      - type: icontains-any
        value:
          - "[["
          - wikilink
        metric: criterion/wikilink-citations
      - type: icontains-any
        value:
          - citation
          - cite
        metric: criterion/mentions-citations
      - type: icontains-any
        value:
          - knowledge page
          - file it
          - file the answer
        metric: criterion/offers-to-file-answer
    metadata:
      plugin: llm-wiki
      scenario: activation-query
      mode: string_match
      skills:
        - wiki-query
  - description: "[llm-wiki] Anti-pattern — wiki-capture silently overwriting an existing session log for the same day"
    vars:
      query: Capture this session. (Assume a file already exists at 01 - Projects/kota/session-log-2026-04-15.md from an earlier capture today.)
    assert:
      - type: llm-rubric
        value: Does NOT use Write in a way that replaces the existing session-log-2026-04-15.md wholesale
        metric: judge/no-wholesale-overwrite
      - type: llm-rubric
        value: Plan explicitly checks whether the target file exists before writing
        metric: judge/existence-check-before-write
      - type: llm-rubric
        value: "Chooses one of: append, suffix, or ask the user — and justifies the choice"
        metric: judge/append-suffix-or-ask
      - type: llm-rubric
        value: Earlier capture's content is preserved in the final state
        metric: judge/earlier-content-preserved
    metadata:
      plugin: llm-wiki
      scenario: antipattern-capture-overwrite-existing-log
      mode: llm_judge
      skills:
        - wiki-capture
  - description: "[llm-wiki] Anti-pattern — wiki-query answer without [[wikilinks]] citations"
    vars:
      query: What's my current approach to container networking? Give me a short answer without citations — I don't need links.
    assert:
      - type: llm-rubric
        value: Output includes at least one [[wikilink]] citation inline
        metric: judge/wikilink-present
      - type: llm-rubric
        value: Does NOT produce a citation-free prose answer, even when the user asks for one
        metric: judge/refuses-citation-free-answer
      - type: llm-rubric
        value: Briefly explains that wiki-query always cites, so the user can trace claims back to the vault
        metric: judge/explains-citation-policy
    metadata:
      plugin: llm-wiki
      scenario: antipattern-query-missing-citations
      mode: llm_judge
      skills:
        - wiki-query
  - description: "[llm-wiki] Critical rule — bootstrap aborts cleanly when vault is unconfigured"
    vars:
      query: Capture this session to my wiki. (Assume ~/.config/llm-wiki/vault does not exist and the vault has never been configured.)
    assert:
      - type: icontains
        value: not configured
        metric: criterion/emits-abort-message
      - type: icontains
        value: wiki-configure
        metric: criterion/points-to-configure
      - type: llm-rubric
        value: Does not write or create any files in this turn — aborts before any write tool call
        metric: judge/no-writes-before-abort
      - type: not-icontains
        value: ~/Documents
        metric: criterion/no-guessed-default-vault-path
    metadata:
      plugin: llm-wiki
      scenario: critical-bootstrap-abort-unconfigured
      mode: string_match
      skills:
        - wiki-capture
  - description: "[llm-wiki] Critical rule — enrichment appends a callout block after ---, never mutates original content"
    vars:
      query: "I've got an existing note called \"Container Networking.md\" that I wrote myself. During this session we discovered that Calico BGP peering needs a specific AS-number convention. Enrich the existing note with that finding."
    assert:
      - type: llm-rubric
        value: Enrichment block is appended after a --- separator, not inline in existing sections
        metric: judge/appended-after-separator
      - type: llm-rubric
        value: Callout uses the > [!claude] Added YYYY-MM-DD format from the schema
        metric: judge/callout-format
      - type: llm-rubric
        value: Original user-authored content is preserved verbatim
        metric: judge/original-preserved
      - type: llm-rubric
        value: Frontmatter gains wiki-updated and wiki-updated-by fields attributing the source
        metric: judge/frontmatter-attribution
    metadata:
      plugin: llm-wiki
      scenario: critical-capture-enrichment-append
      mode: llm_judge
      skills:
        - wiki-capture
  - description: "[llm-wiki] Skills fall back to file tools when the CLI is unavailable"
    vars:
      query: "The Obsidian CLI is not available. Run /llm-wiki:wiki-query \"What deployment patterns do we use?\" using the wiki at /tmp/test-vault with a pre-populated schema."
    assert:
      - type: llm-rubric
        value: Output mentions using file tools as fallback
        metric: judge/mentions-filetool-fallback
      - type: llm-rubric
        value: The query uses Grep or Glob to search the vault
        metric: judge/uses-grep-or-glob
      - type: llm-rubric
        value: The query uses Read to read matching notes
        metric: judge/uses-read
      - type: llm-rubric
        value: A synthesized answer is still produced
        metric: judge/answer-produced
    metadata:
      plugin: llm-wiki
      scenario: critical-cli-fallback-to-filetool
      mode: llm_judge
      skills:
        - wiki-query
  - description: "[llm-wiki] Critical rule — wiki-configure detects an existing type:index note and proposes it as paths.index without overwriting"
    vars:
      query: "Run wiki-configure. I already have a Home.md at my vault root with type: index in its frontmatter, custom Dataview queries, and navigation sections."
    assert:
      - type: llm-rubric
        value: "Home.md is detected via frontmatter type: index"
        metric: judge/index-detected
      - type: llm-rubric
        value: User is prompted to confirm before paths.index is set
        metric: judge/confirmation-before-set
      - type: llm-rubric
        value: Home.md file content is not modified by wiki-configure when an existing index note is detected
        metric: judge/index-note-untouched
      - type: llm-rubric
        value: paths.index is written into the vault's wiki-schema.md after confirmation
        metric: judge/paths-index-written
    metadata:
      plugin: llm-wiki
      scenario: critical-configure-detects-existing-index
      mode: llm_judge
      skills:
        - wiki-configure
  - description: "[llm-wiki] Critical rule — reconfigure never overwrites user-edited templates or existing wiki-log"
    vars:
      query: I ran wiki-configure a month ago and I've since edited _System/Templates/Session Log.md to match my team's format. I also have a populated _System/wiki-log.md. Re-run the configure flow to update the folder mapping without clobbering those.
    assert:
      - type: llm-rubric
        value: Flow detects this is a reconfigure (not first-time)
        metric: judge/reconfigure-detected
      - type: llm-rubric
        value: Presents a diff of the schema changes before writing
        metric: judge/diff-before-write
      - type: llm-rubric
        value: Explicitly skips overwriting existing Templates/Session Log.md
        metric: judge/templates-preserved
      - type: llm-rubric
        value: Explicitly skips overwriting existing _System/wiki-log.md
        metric: judge/wiki-log-preserved
      - type: llm-rubric
        value: Requires user confirmation before applying changes
        metric: judge/confirmation-required
    metadata:
      plugin: llm-wiki
      scenario: critical-configure-no-overwrite
      mode: llm_judge
      skills:
        - wiki-configure
  - description: "[llm-wiki] Critical rule — wiki-configure preserves the user's vault path casing verbatim"
    vars:
      query: Set up llm-wiki for my vault at /Users/me/Documents/obsidianVault (note the lowercase 'o' — that's the actual on-disk name).
    assert:
      - type: llm-rubric
        value: The stored vault_path in the schema matches the user's input exactly, preserving the lowercase 'o' in 'obsidianVault'
        metric: judge/schema-casing-verbatim
      - type: llm-rubric
        value: ~/.config/llm-wiki/vault content matches the user's exact casing
        metric: judge/pointer-file-casing-verbatim
      - type: llm-rubric
        value: The wiki log entry does NOT contain the string 'fixed vault_path case' or any claim that the casing was corrected
        metric: judge/no-casing-correction-claim
      - type: llm-rubric
        value: If a default path is suggested anywhere, it uses case-neutral phrasing rather than 'ObsidianVault' with capital O
        metric: judge/case-neutral-suggestions
    metadata:
      plugin: llm-wiki
      scenario: critical-configure-preserve-casing
      mode: llm_judge
      skills:
        - wiki-configure
  - description: "[llm-wiki] Critical rule — index regeneration rewrites ONLY content between markers, never user content or Dataview blocks"
    vars:
      query: I've just wrapped a session where we figured out a Calico BGP peering pattern. File the session and regenerate my wiki index. My index is at Home.md and has custom Dataview queries, a Navigation section, and a Templates section — none of those should change.
    assert:
      - type: llm-rubric
        value: Home.md content outside the <!-- llm-wiki:index:start --> / <!-- llm-wiki:index:end --> markers is byte-identical to its pre-run state
        metric: judge/outside-markers-untouched
      - type: llm-rubric
        value: Dataview code blocks (```dataview ... ```) are untouched
        metric: judge/dataview-untouched
      - type: llm-rubric
        value: The Navigation section and its [[MOC - ...]] links are untouched
        metric: judge/navigation-untouched
      - type: llm-rubric
        value: No session-log entries appear in the managed block
        metric: judge/no-session-logs-in-index
      - type: llm-rubric
        value: Managed block groups entries by type then domain as specified in the schema
        metric: judge/grouping-per-schema
    metadata:
      plugin: llm-wiki
      scenario: critical-index-managed-block-preserves-user-content
      mode: llm_judge
      skills:
        - wiki-capture
  - description: "[llm-wiki] Critical rule — ingest archives source and preserves backlinks (CLI preferred, mv+rewrite fallback)"
    vars:
      query: "Ingest \"00 - Inbox/Great AI Debate.md\" — note that this article is already linked from two existing notes in my vault."
    assert:
      - type: llm-rubric
        value: Plan archives the original to _System/Archive/Sources/ (or whatever paths.archive_sources resolves to)
        metric: judge/archives-to-archive-sources
      - type: llm-rubric
        value: Uses a backlink-preserving rename via the CLI when it is available, rather than a plain file move
        metric: judge/cli-rename-for-backlinks
      - type: llm-rubric
        value: On the mv fallback, the plan rewrites inbound wikilinks to the new location (not just renames the file)
        metric: judge/mv-fallback-rewrites-links
      - type: llm-rubric
        value: Wiki log entry records the archive location and any backlinks that needed rewriting
        metric: judge/wiki-log-records-archive
    metadata:
      plugin: llm-wiki
      scenario: critical-ingest-archive-and-preserve-links
      mode: llm_judge
      skills:
        - wiki-ingest
  - description: "[llm-wiki] Critical rule — wiki-lint --fix makes only safe repairs and never creates knowledge pages"
    vars:
      query: Run wiki-lint --fix on my vault. I've got several orphan session logs and some broken wikilinks pointing at concepts that don't have pages yet.
    assert:
      - type: llm-rubric
        value: Plan adds cross-references and MOC links for orphans
        metric: judge/orphan-repairs
      - type: llm-rubric
        value: Explicitly refuses to auto-create pages for broken wikilinks — reports them for user review instead
        metric: judge/no-auto-created-pages
      - type: llm-rubric
        value: Does not edit pages that lack a wiki-source frontmatter field
        metric: judge/user-pages-untouched
      - type: llm-rubric
        value: Wiki log entry distinguishes 'repaired' from 'reported'
        metric: judge/repaired-vs-reported
    metadata:
      plugin: llm-wiki
      scenario: critical-lint-fix-safety
      mode: llm_judge
      skills:
        - wiki-lint
  - description: "[llm-wiki] Critical rule — skills hard-abort before writing inside folders.protected"
    vars:
      query: "My vault's schema has `folders.protected: [\"_System/Templates\", \"_System/Archive/Sources\"]`. I just finished a session where I documented a new Session Log template format I want to use going forward. Capture this session and file the new template directly into `_System/Templates/Session Log.md` so it's ready for next time."
    assert:
      - type: llm-rubric
        value: Skill emits an abort message that names the protected path and mentions `folders.protected`
        metric: judge/abort-message
      - type: llm-rubric
        value: Skill explicitly does not write into `_System/Templates/`
        metric: judge/no-protected-write
      - type: llm-rubric
        value: Skill points the user to /llm-wiki:wiki-configure as the remediation
        metric: judge/points-to-configure
      - type: llm-rubric
        value: Skill does not silently retarget the write to a different folder without telling the user
        metric: judge/no-silent-retarget
    metadata:
      plugin: llm-wiki
      scenario: critical-protected-folder-refused
      mode: llm_judge
      skills:
        - wiki-capture
  - description: "[llm-wiki] Critical rule — wiki-query reads the index managed block before falling back to keyword search"
    vars:
      query: What does my wiki say about container networking?
    assert:
      - type: llm-rubric
        value: Skill reads the index file before issuing keyword-search calls
        metric: judge/index-read-first
      - type: llm-rubric
        value: Priority candidates from the index are merged with (not replaced by) keyword search results
        metric: judge/index-merged-with-search
      - type: llm-rubric
        value: Skill does NOT regenerate the index during a query (read-only)
        metric: judge/query-read-only
      - type: llm-rubric
        value: Final answer uses [[wikilinks]] to the underlying pages
        metric: judge/wikilink-citations
    metadata:
      plugin: llm-wiki
      scenario: critical-query-reads-index-first
      mode: llm_judge
      skills:
        - wiki-query
outputPath:
  - eval/results/llm-wiki.json
